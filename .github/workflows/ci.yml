name: ci

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - package.json
      - src/**
      # start: e2e #
      - e2e/**
      # end: e2e #
      # start: docker #
      - Dockerfile
      # end: docker #
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - package.json
      - src/**
      # start: e2e #
      - e2e/**
      # end: e2e #
      # start: docker #
      - Dockerfile
      # end: docker #
  ####### 👉 remove #######
  repository_dispatch:
    types: [trigger-ci]
  ########################

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node
      - run: pnpm lint
      - run: npx biome check . && npx prettier --check './**/*.{md,yml}'
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-db
      - run: pnpm build
  # start: docker #
  build-docker:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-db
      - run: |
          docker build \
            -t app \
            -f Dockerfile \
            --add-host=host.docker.internal:host-gateway \
            --build-arg NEXT_PUBLIC_SITE_URL=${{env.NEXT_PUBLIC_SITE_URL}} \
            --build-arg TRACE_EXPORTER_URL=${{env.TRACE_EXPORTER_URL}} \
            --build-arg STRIPE_PRICE_ID=${{env.STRIPE_PRICE_ID}} \
            -e DATABASE_USER=${{env.DATABASE_USER}} \
            -e DATABASE_PASSWORD=${{env.DATABASE_PASSWORD}} \
            -e DATABASE_DB=${{env.DATABASE_DB}} \
            -e DATABASE_HOST=${{env.DATABASE_HOST}} \
            -e DATABASE_PORT=${{env.DATABASE_PORT}} \
            -e DATABASE_SCHEMA=${{env.DATABASE_SCHEMA}} \
            .
        env:
          # Database configuration for testing
          DATABASE_USER: local
          DATABASE_PASSWORD: 1234
          DATABASE_DB: local
          DATABASE_HOST: host.docker.internal
          DATABASE_PORT: 5432
          DATABASE_SCHEMA: public
          # start: otel #
          TRACE_EXPORTER_URL: ""
          # end: otel #
          # start: stripe #
          STRIPE_PRICE_ID: price_1
          # end: stripe #
      - run: |
          docker run -d -p 3000:3000 \
            -e DATABASE_USER=${{env.DATABASE_USER}} \
            -e DATABASE_PASSWORD=${{env.DATABASE_PASSWORD}} \
            -e DATABASE_DB=${{env.DATABASE_DB}} \
            -e DATABASE_HOST=${{env.DATABASE_HOST}} \
            -e DATABASE_PORT=${{env.DATABASE_PORT}} \
            -e DATABASE_SCHEMA=${{env.DATABASE_SCHEMA}} \
            -e GOOGLE_CLIENT_ID=${{env.GOOGLE_CLIENT_ID}} \
            -e GOOGLE_CLIENT_SECRET=${{env.GOOGLE_CLIENT_SECRET}} \
            -e NEXTAUTH_SECRET=${{env.NEXTAUTH_SECRET}} \
            -e STRIPE_SECRET_KEY=${{env.STRIPE_SECRET_KEY}} \
            -e STRIPE_WEBHOOK_SECRET=${{env.STRIPE_WEBHOOK_SECRET}} \
            app
        env:
          # Database configuration for testing
          DATABASE_USER: local
          DATABASE_PASSWORD: 1234
          DATABASE_DB: local
          DATABASE_HOST: host.docker.internal
          DATABASE_PORT: 5432
          DATABASE_SCHEMA: public
          # Test credentials (use GitHub secrets for production)
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          NEXTAUTH_SECRET: TKDdLVjf7cTyTs5oWVpv04senu6fia4RGQbYHRQIR5Q=
          # start: stripe #
          STRIPE_SECRET_KEY: pk_test_1
          STRIPE_WEBHOOK_SECRET: whsec_1
          # end: stripe #
      - run: |
          until $(curl --output /dev/null --silent --fail ${{env.NEXT_PUBLIC_SITE_URL}}); do
            printf '!'
            sleep 1
          done
        timeout-minutes: 1
  # end: docker #
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node
      - run: pnpm test
  # start: e2e #
  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-db
      - run: pnpm exec playwright install chromium
      - run: pnpm build
      - run: pnpm test:e2e
  # end: e2e #
